<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SkoolChat</title>

<style>

body{
margin:0;
font-family:sans-serif;
display:flex;
height:100vh;
background:#ece5dd;
}

/* sidebar */

#sidebar{
width:280px;
background:#111b21;
color:white;
display:flex;
flex-direction:column;
}

#profile{
padding:15px;
background:#202c33;
display:flex;
align-items:center;
gap:10px;
}

#rooms{
flex:1;
overflow:auto;
}

.room{
padding:12px;
cursor:pointer;
border-bottom:1px solid #2a3942;
}

.room:hover{
background:#2a3942;
}

/* chat area */

#main{
flex:1;
display:flex;
flex-direction:column;
}

#header{
background:#202c33;
color:white;
padding:12px;
}

#messages{
flex:1;
overflow:auto;
padding:15px;
}

.msg{
max-width:65%;
padding:8px 12px;
border-radius:8px;
margin:6px 0;
}

.me{
background:#d9fdd3;
margin-left:auto;
}

.other{
background:white;
}

#inputBar{
display:flex;
padding:10px;
background:#f0f0f0;
}

#msgBox{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

#send{
margin-left:8px;
background:#25d366;
border:none;
padding:10px 16px;
border-radius:20px;
cursor:pointer;
}

#send:active{
transform:scale(.9);
}

#settings{
position:absolute;
top:60px;
left:20px;
background:white;
padding:15px;
border-radius:10px;
display:none;
box-shadow:0 5px 20px rgba(0,0,0,.2);
}

</style>
</head>

<body>

<div id="sidebar">

<div id="profile">
<span id="usernameLabel">User</span>
<button onclick="toggleSettings()">⚙️</button>
</div>

<div id="rooms"></div>

<button onclick="createRoom()">+ New Room</button>

</div>

<div id="main">

<div id="header">Chat</div>

<div id="messages"></div>

<div id="inputBar">
<input id="msgBox" placeholder="Message">
<button id="send">Send</button>
</div>

</div>


<div id="settings">

<h3>Settings</h3>

<input id="nameInput" placeholder="username">
<br><br>

<button onclick="saveProfile()">Save</button>

<button onclick="logout()">Logout</button>

</div>


<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"


const supabase = createClient(
"https://gkkacqhittcxuogqgjge.supabase.co",
"sb_publishable_d4EZ5SBYs4EKyZ0_5Tlj0g_JSb0l-yI"
)


let user=null
let currentRoom=null


const messagesDiv=document.getElementById("messages")
const roomsDiv=document.getElementById("rooms")


function toggleSettings(){
const s=document.getElementById("settings")
s.style.display=s.style.display==="block"?"none":"block"
}


async function login(){

const email=prompt("enter email")

await supabase.auth.signInWithOtp({email})

alert("check email then reload")

}


async function getUser(){

const {data}=await supabase.auth.getUser()

if(!data.user){

await login()

return

}

user=data.user

}


async function loadRooms(){

const {data}=await supabase
.from("rooms")
.select("*")

roomsDiv.innerHTML=""

data.forEach(r=>{

const div=document.createElement("div")

div.className="room"

div.innerText=r.name

div.onclick=()=>openRoom(r.id,r.name)

roomsDiv.appendChild(div)

})

}


async function createRoom(){

const name=prompt("room name")

if(!name)return

await supabase
.from("rooms")
.insert({name})

loadRooms()

}


async function openRoom(id,name){

currentRoom=id

document.getElementById("header").innerText=name

loadMessages()

}


function addMessage(m){

const div=document.createElement("div")

div.className="msg "+(m.sender_id===user.id?"me":"other")

div.innerText=m.content

messagesDiv.appendChild(div)

messagesDiv.scrollTop=messagesDiv.scrollHeight

}


async function loadMessages(){

if(!currentRoom)return

const {data}=await supabase
.from("messages")
.select("*")
.eq("room_id",currentRoom)
.order("created_at",{ascending:true})

messagesDiv.innerHTML=""

data.forEach(addMessage)

}


async function sendMessage(){

const box=document.getElementById("msgBox")

const text=box.value.trim()

if(!text)return

await supabase
.from("messages")
.insert({
room_id:currentRoom,
sender_id:user.id,
content:text
})

box.value=""

}


async function subscribe(){

supabase
.channel("realtime")

.on(
"postgres_changes",
{
event:"INSERT",
schema:"public",
table:"messages"
},
payload=>{

if(payload.new.room_id===currentRoom)
addMessage(payload.new)

})

.subscribe()

}


async function saveProfile(){

const name=document.getElementById("nameInput").value

await supabase
.from("users")
.insert({
auth_id:user.id,
username:name
})

document.getElementById("usernameLabel").innerText=name

}


async function logout(){

await supabase.auth.signOut()

location.reload()

}


document.getElementById("send").onclick=sendMessage


async function start(){

await getUser()

loadRooms()

subscribe()

}

start()

</script>

</body>
</html>
