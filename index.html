<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:sans-serif;
margin:0;
background:#ece5dd;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#075e54;
color:white;
padding:12px;
display:flex;
align-items:center;
gap:10px;
}

header img{
width:36px;
height:36px;
border-radius:50%;
}

#messages{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

.msg{
max-width:70%;
padding:8px 12px;
border-radius:10px;
display:flex;
gap:8px;
align-items:flex-end;
}

.msg img{
width:30px;
height:30px;
border-radius:50%;
}

.me{
align-self:flex-end;
background:#dcf8c6;
}

.other{
align-self:flex-start;
background:white;
}

#inputArea{
display:flex;
padding:10px;
background:#f0f0f0;
gap:8px;
}

#msgInput{
flex:1;
padding:10px;
border-radius:20px;
border:none;
}

#sendBtn{
background:#25d366;
border:none;
color:white;
font-size:16px;
border-radius:50%;
width:40px;
height:40px;
cursor:pointer;
transition:0.2s;
}

#sendBtn:active{
transform:scale(0.8);
}

</style>
</head>

<body>

<header>
<img id="myAvatar">
<div id="roomName"></div>
</header>

<div id="messages"></div>

<div id="inputArea">
<input id="msgInput" placeholder="Message">
<button id="sendBtn">➤</button>
</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
'https://wriwchqhwjvujmkpyzai.supabase.co',
'sb_publishable_t5CJXeZxFY1gtCPu_PH7nQ_9lnlg9AT'
)

let username = localStorage.getItem("username")
let room = localStorage.getItem("room")
let avatar = localStorage.getItem("avatar")

if(!username){
username = prompt("Username")
localStorage.setItem("username",username)
}

if(!room){
room = prompt("Room name")
localStorage.setItem("room",room)
}

if(!avatar){
avatar = prompt("Profile picture URL (optional)")
localStorage.setItem("avatar",avatar)
}

document.getElementById("roomName").innerText = room
document.getElementById("myAvatar").src = avatar || "https://i.imgur.com/HeIi0wU.png"

const messagesDiv = document.getElementById("messages")

function addMessage(msg){

const div = document.createElement("div")

div.className = "msg " + (msg.username===username ? "me":"other")

div.innerHTML = `
<img src="${msg.avatar_url || 'https://i.imgur.com/HeIi0wU.png'}">
<div>
<b>${msg.username}</b><br>
${msg.message}
</div>
`

messagesDiv.appendChild(div)
messagesDiv.scrollTop = messagesDiv.scrollHeight

}

async function loadMessages(){

const {data} = await supabase
.from("messages")
.select("*")
.eq("room",room)
.order("created_at",{ascending:true})

messagesDiv.innerHTML=""

if(data){
  data.forEach(addMessage)
}

}

async function sendMessage(){

const text = document.getElementById("msgInput").value.trim()

if(!text) return

document.getElementById("msgInput").value=""

await supabase.from("messages").insert({
username:username,
room:room,
message:text,
avatar_url:avatar
})

}

document.getElementById("sendBtn").onclick=sendMessage

document.getElementById("msgInput").addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage()
})

loadMessages()

supabase.channel("realtime")
.on(
"postgres_changes",
{event:"INSERT",schema:"public",table:"messages"},
payload=>{
if(payload.new.room===room){
addMessage(payload.new)
}
}
)
.subscribe()

</script>

</body>
</html>
